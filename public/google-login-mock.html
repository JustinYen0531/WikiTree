<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用 Google 帳戶登入</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #1f1f1f;
      --text-secondary: #5f6368;
      --border-color: #dadce0;
      --hover-color: #f7f8f8;
      --accent-color: #1a73e8;
      --accent-hover: #1557b0;
    }

    /* Simple dark theme check from opener if possible, or media query */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1f1f1f;
        --text-primary: #e3e3e3;
        --text-secondary: #9e9e9e;
        --border-color: #3c4043;
        --hover-color: #303134;
        --accent-color: #8ab4f8;
        --accent-hover: #aecbfa;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: var(--card-bg);
      box-sizing: border-box;
      position: relative;
    }

    @media (max-width: 480px) {
      .container {
        border: none;
        padding: 24px;
      }
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .title {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin: 0 0 8px 0;
    }

    .subtitle {
      font-size: 16px;
      text-align: center;
      color: var(--text-secondary);
      margin: 0 0 24px 0;
    }

    .subtitle strong {
      color: var(--text-primary);
    }

    /* Account list */
    .account-list {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }

    .account-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--border-color);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .account-item:hover {
      background-color: var(--hover-color);
      margin-left: -40px;
      margin-right: -40px;
      padding-left: 40px;
      padding-right: 40px;
    }

    @media (max-width: 480px) {
      .account-item:hover {
        margin-left: -24px;
        margin-right: -24px;
        padding-left: 24px;
        padding-right: 24px;
      }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 12px;
      object-fit: cover;
    }

    .avatar-text {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 12px;
      background-color: var(--accent-color);
      color: #ffffff;
      display: flex;
      align-items: center;
      justifyContent: center;
      font-weight: bold;
      font-size: 14px;
    }

    .account-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .account-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-email {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Custom form */
    .custom-form {
      display: none;
      flex-direction: column;
      gap: 16px;
      margin-top: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    input {
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background-color: transparent;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-color);
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--accent-color);
    }

    .btn-secondary:hover {
      background-color: var(--hover-color);
    }

    .btn-primary {
      background-color: var(--accent-color);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-top: 24px;
      text-align: center;
    }

    .footer a {
      color: var(--accent-color);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Progress bar */
    .progress-container {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: var(--border-color);
      overflow: hidden;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .progress-bar {
      width: 40%;
      height: 100%;
      background-color: var(--accent-color);
      position: absolute;
      animation: loading 1.5s infinite linear;
    }

    @keyframes loading {
      0% { left: -40%; }
      50% { left: 30%; width: 50%; }
      100% { left: 100%; }
    }

    .config-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-top: 16px;
      cursor: pointer;
    }

    .config-link:hover {
      text-decoration: underline;
      color: var(--accent-color);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="progress-container" id="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="logo-container">
      <!-- Google Logo SVG -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </div>

    <h2 class="title" id="main-title">選擇帳戶</h2>
    <p class="subtitle" id="main-subtitle">以繼續前往 <strong>nccu-hub</strong></p>

    <!-- Selection View -->
    <div id="selection-view">
      <div class="account-list">
        <!-- Account 1 -->
        <div class="account-item" onclick="selectAccount('NCCU 測試用戶', 'service@nccu.edu.tw', 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80')">
          <img class="avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" alt="Avatar">
          <div class="account-info">
            <span class="account-name">NCCU 測試用戶</span>
            <span class="account-email">service@nccu.edu.tw</span>
          </div>
        </div>
        <!-- Account 2 -->
        <div class="account-item" onclick="selectAccount('NCCU 學生帳戶', 'student@nccu.edu.tw', '')">
          <div class="avatar-text" style="background-color: #34A853;">S</div>
          <div class="account-info">
            <span class="account-name">NCCU 學生帳戶</span>
            <span class="account-email">student@nccu.edu.tw</span>
          </div>
        </div>
        <!-- Use another account -->
        <div class="account-item" onclick="showCustomForm()">
          <div class="avatar-text" style="background-color: #5f6368; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #ffffff;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
          </div>
          <div class="account-info">
            <span class="account-name" style="color: var(--accent-color);">使用其他帳戶</span>
            <span class="account-email">以自訂姓名與信箱登入</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Custom Input Form View -->
    <div id="custom-form-view" class="custom-form">
      <div class="form-group">
        <label for="input-name">您的姓名</label>
        <input type="text" id="input-name" placeholder="例如：王小明" required>
      </div>
      <div class="form-group">
        <label for="input-email">您的 Google 電子信箱</label>
        <input type="email" id="input-email" placeholder="username@gmail.com" required>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="hideCustomForm()">返回</button>
        <button class="btn btn-primary" onclick="submitCustomForm()">登入</button>
      </div>
    </div>

    <div class="footer">
      若要繼續，Google 會將您的名稱、電子郵件地址、語言偏好設定和個人資料相片傳送給 <strong>nccu-hub</strong>。
    </div>

    <a class="config-link" onclick="triggerConfig()">⚙️ 設定真實 Google Cloud Client ID</a>
  </div>

  <script>
    function selectAccount(name, email, picture) {
      document.getElementById('progress').style.display = 'block';
      
      const user = {
        name: name,
        email: email,
        picture: picture || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80',
        token: 'mock-jwt-token-' + Math.random().toString(36).substring(2, 15),
        isMock: true
      };

      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_MOCK_LOGIN_SUCCESS', user: user }, window.location.origin);
        }
        window.close();
      }, 1000);
    }

    function showCustomForm() {
      document.getElementById('selection-view').style.display = 'none';
      document.getElementById('custom-form-view').style.display = 'flex';
      document.getElementById('main-title').innerText = '登入';
      document.getElementById('main-subtitle').innerText = '使用您的 Google 帳戶';
    }

    function hideCustomForm() {
      document.getElementById('selection-view').style.display = 'block';
      document.getElementById('custom-form-view').style.display = 'none';
      document.getElementById('main-title').innerText = '選擇帳戶';
      document.getElementById('main-subtitle').innerHTML = '以繼續前往 <strong>nccu-hub</strong>';
    }

    function submitCustomForm() {
      const name = document.getElementById('input-name').value.trim();
      const email = document.getElementById('input-email').value.trim();

      if (!name || !email) {
        alert('請填寫完整資訊');
        return;
      }

      if (!email.includes('@')) {
        alert('請輸入有效的電子信箱');
        return;
      }

      // Pre-select or random avatar colors based on name first letter
      const alphabetColors = ['#4285F4', '#34A853', '#FBBC05', '#EA4335', '#9C27B0', '#3F51B5', '#009688'];
      const randomIndex = Math.abs(name.charCodeAt(0) % alphabetColors.length);
      const color = alphabetColors[randomIndex];
      
      // Generating a cute SVG avatar dynamically for the customized user
      const avatarSvg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="${encodeURIComponent(color)}"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="45" font-weight="bold" fill="%23ffffff">${encodeURIComponent(name.charAt(0).toUpperCase())}</text></svg>`;

      document.getElementById('progress').style.display = 'block';

      const user = {
        name: name,
        email: email,
        picture: avatarSvg,
        token: 'mock-jwt-token-custom-' + Math.random().toString(36).substring(2, 15),
        isMock: true
      };

      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_MOCK_LOGIN_SUCCESS', user: user }, window.location.origin);
        }
        window.close();
      }, 1200);
    }

    function triggerConfig() {
      if (window.opener) {
        window.opener.postMessage({ type: 'OPEN_CLIENT_ID_CONFIG' }, window.location.origin);
      }
      window.close();
    }
  </script>
</body>
</html>
